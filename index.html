<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Inicio da Tabela -->
     <table>
        <!-- Titulo para a tabela  -->
         <caption>Nomes de Hotéis</caption>

         <!-- cabeçalho da tabela -->
          <thead>
            <tr>
                <!-- colunas titulos -->                
              <th>Nome</th>
              <th>Localização</th>
              <th>Classificação</th>
              <th>Média de preços</th>
            </tr>
          </thead>

          <!-- Corpo da tabela -->
           <tr>
              <td>Hotel A</td>
              <td>São Paulo, SP</td>
              <td>5 estrelas</td>
              <td>R$ 500,00</td>
           </tr>
     </table>
</body>
</html>
