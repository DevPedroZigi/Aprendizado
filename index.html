<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Inicio da Tabela -->
     <table>
        <!-- Titulo para a tabela  -->
         <caption>Nomes de Hotéis</caption>

         <!-- cabeçalho da tabela -->
          <thead>
            <tr>
                <!-- colunas titulos -->                
              <th>Nome</th>
              <th>Localização</th>
              <th>Classificação</th>
              <th>Média de preços</th>
            </tr>
          </thead>

          <!-- Corpo da tabela -->
           <tbody>

            <tr>
                <td>Hotel A</td>
                <td>São Paulo, SP</td>
                <td>5 estrelas</td>
                <td>R$ 500,00</td>
            </tr>

            <tr>
                <td>Hotel B</td>
                <td>Rio de Janeiro, RJ</td>
                <td>4 estrelas</td>
                <td>R$ 300,00</td>
            </tr>  

            <tr>
                <td>Hotel C</td>
                <td>Salvador, BA</td>
                <td>3 estrelas</td>
                <td>R$ 200,00</td>
            </tr>

           </tbody>

           <!-- Rodapé da tabela -->
            <tfoot>
                <tr>
                    <td colspan="4">Informações de hotéis no Brasil</td>
                </tr>
            </tfoot>
            <!-- Tfoot pode ser colocado antes do tbody, mas é recomendado colocar depois para melhor organização do código. -->

     </table>
</body>
</html>
